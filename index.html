<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<style>
body{
  font-family:Arial;
  background:#f3f3f3;
  margin:0;
}
h1{
  text-align:center;
  margin:20px 0;
}
#join,#chatRoom{
  max-width:520px;
  margin:auto;
  text-align:center;
}
input{
  padding:10px;
  margin:6px 0;
  width:100%;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}
button{
  padding:10px 18px;
  background:#444;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  display:block;
  margin:10px auto;
}
button:hover{
  background:#333;
}
#online{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}
#chat{
  list-style:none;
  padding:0;
  height:360px;
  overflow-y:auto;
  border:1px solid #ccc;
  background:white;
  border-radius:6px;
}
/* Make message li a relative container for absolute positioning of the dots */
.msg{
  position: relative;
  padding:8px 10px;
  border-bottom:1px solid #eee;
  max-width:80%;
  margin:4px;
  border-radius:6px;
  cursor:default;
  word-wrap: break-word;
}
.msg .name{
  font-weight:bold;
}
.msg .time{
  color:#888;
  font-size:12px;
  margin-left:6px;
}
.msg.self{
  background:#DCF8C6;
  margin-left:auto;
  text-align:right;
  /* Reserve left space for the delete button in top-left corner */
  padding-left: 30px;
}
.msg.other{
  background:#FFF;
  margin-right:auto;
  text-align:left;
}
/* Three-dots delete button style (only shown on own messages, top-left) */
.delete-dots {
  position: absolute;
  top: 4px;
  left: 6px;
  cursor: pointer;
  padding: 0 6px 2px 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
  line-height: 1.4;
  color: #555;
  transition: background 0.2s;
  user-select: none;
  z-index: 5;
}
.delete-dots:hover {
  background: rgba(0,0,0,0.2);
  color: #000;
}
/* Link styles inside messages */
.msg a {
  color: #0066cc;
  text-decoration: underline;
  word-break: break-all;
}
.msg a:hover {
  color: #004499;
}
.row{
  display:flex;
  gap:6px;
}
#msg{
  flex:1;
}
/* Subtle hint under main title */
.sub-hint {
  font-size:14px;
  color:#666;
  margin:10px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<h1>Chat Room</h1>

<!-- Modified join section: contains both room and name inputs -->
<div id="join">
  <input id="room" placeholder="Enter room name">
  <input id="joinName" placeholder="Your name" value="">
  <button onclick="joinRoom()">Join Room</button>
  <div class="sub-hint">Enter room name and your name to join</div>
</div>

<div id="chatRoom" style="display:none">
  <!-- Removed the old name input, show current user name instead -->
  <div style="margin-bottom:8px; font-weight:bold;">Your name: <span id="displayName"></span></div>
  <div id="online">Users online: 0</div>
  <ul id="chat"></ul>
  <div class="row">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCqKKmfHbyMrLwxthpY7oYAoNqbekWBOuYk",
authDomain:"chat-site-12345.firebaseapp.com",
databaseURL:"https://chat-site-12345-default-rtdb.firebaseio.com",
projectId:"chat-site-12345",
appId:"1:660571630838:web:7be88b3d899720ba1590d7"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let room="";
let userId=Math.random().toString(36).substr(2,9);
// No longer auto-read name from localStorage; it will be taken from joinName input

// --- New message sound and title notification feature ---
let pageVisible = true;                 // whether current page is visible
let unreadCount = 0;                    // unread counter
const originalTitle = document.title;   // store original title
let notificationSound = null;            // audio object

// Initialize audio (can only play after user interaction, so create but don't play)
function initAudio() {
  if (notificationSound) return;
  try {
    notificationSound = new Audio('ring.m4a');
    notificationSound.preload = 'auto';
    // Try to load, but not play
    notificationSound.load();
  } catch (e) {
    console.warn('Audio initialization failed:', e);
  }
}

// Play notification sound (requires user gesture)
function playNotificationSound() {
  if (!notificationSound) {
    initAudio();
  }
  if (notificationSound) {
    // Reset playback position to avoid only playing once for consecutive messages
    notificationSound.currentTime = 0;
    notificationSound.play().catch(e => {
      // Browsers blocking autoplay is normal, silently handle
      console.log('Audio playback blocked by browser (user interaction needed for autoplay)');
    });
  }
}

// Listen for page visibility changes
document.addEventListener("visibilitychange", function() {
  pageVisible = !document.hidden;
  if (pageVisible) {
    // Clear unread count and title hint when returning to page
    unreadCount = 0;
    document.title = originalTitle;
  }
});

// Click anywhere to try initializing audio (to overcome autoplay policy)
document.addEventListener('click', function once() {
  initAudio();
  document.removeEventListener('click', once);
}, { once: true });

// When a new message arrives, call this function (excluding messages sent by self)
function handleNewMessage(messageSender) {
  const currentUser = localStorage.getItem("chatName") || "";
  
  // Only notify if the message is not from self and page is hidden
  if (messageSender !== currentUser) {
    if (!pageVisible) {
      unreadCount++;
      document.title = `(${unreadCount}) ${originalTitle}`;
      
      // Attempt to play sound (browser may block if page hidden, but try anyway)
      playNotificationSound();
    } else {
      // Page visible: no sound, no title change
      // If you want sound even when visible (like FB), uncomment the line below
      // playNotificationSound();
    }
  }
}
// --- End sound and title notification ---

function joinRoom(){
  // Get room and name from the new input fields
  room = document.getElementById("room").value.trim();
  let joinName = document.getElementById("joinName").value.trim();
  
  if(!room) {
    alert("Please enter a room name");
    return;
  }
  if(!joinName) {
    alert("Please enter your name");
    return;
  }
  
  // Save name to localStorage for later use, and display it at the top of chat room
  localStorage.setItem("chatName", joinName);
  document.getElementById("displayName").textContent = joinName;
  
  // Hide join section, show chat room
  document.getElementById("join").style.display = "none";
  document.getElementById("chatRoom").style.display = "block";
  
  // Track online users, load messages
  trackOnline();
  loadMessages();
  
  // Try to initialize audio after joining (user clicked button, so gesture is available)
  initAudio();
}

function trackOnline(){
  const connectedRef=db.ref(".info/connected");
  connectedRef.on("value",snap=>{
    if(snap.val()===true){
      let ref=db.ref("online/"+room+"/"+userId);
      ref.set(true);
      ref.onDisconnect().remove();
    }
  });
  db.ref("online/"+room).on("value",snap=>{
    let count=0;
    if(snap.exists()) count=snap.numChildren();
    document.getElementById("online").textContent="Users online: "+count;
  });
}

// Enter key event: now listens on both inputs in join page, triggers same function
document.getElementById("room").addEventListener("keypress",e=>{
  if(e.key==="Enter") joinRoom();
});
document.getElementById("joinName").addEventListener("keypress",e=>{
  if(e.key==="Enter") joinRoom();
});
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

function send(){
  // Get name from localStorage (set during joinRoom)
  let name = localStorage.getItem("chatName") || "";
  let msg = document.getElementById("msg").value.trim();
  if(!name||!msg) return;
  
  let message={name:name,msg:msg,time:Date.now()};
  db.ref("messages/"+room).push(message);
  document.getElementById("msg").value="";
}

function formatTime(t){
  let d=new Date(t);
  let h=d.getHours().toString().padStart(2,"0");
  let m=d.getMinutes().toString().padStart(2,"0");
  return h+":"+m;
}

function displayMessage(m, key){
  let li = document.createElement("li");
  li.id = "msg-" + key;

  let currentName = localStorage.getItem("chatName") || "";
  let isSelf = (m.name === currentName);
  li.className = "msg " + (isSelf ? "self" : "other");

  // --- Escape message content and turn http/https links into clickable links ---
  let rawMsg = m.msg || "";
  let escapedMsg = rawMsg.replace(/[&<>"]/g, function(match) {
    if (match === '&') return '&amp;';
    if (match === '<') return '&lt;';
    if (match === '>') return '&gt;';
    if (match === '"') return '&quot;';
    return match;
  });
  // Convert http:// or https:// links to <a> tags
  escapedMsg = escapedMsg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

  li.innerHTML = "<span class='name'>" + m.name + "</span>" +
                 "<span class='time'>" + formatTime(m.time) + "</span>" +
                 "<div>" + escapedMsg + "</div>";

  // --- If it's own message, add three-dots delete button (top-left) ---
  if (isSelf && key) {
    let delBtn = document.createElement("span");
    delBtn.className = "delete-dots";
    delBtn.textContent = "...";
    delBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      if (confirm("Delete your message?")) {
        db.ref("messages/" + room + "/" + key).remove();
      }
    });
    li.appendChild(delBtn);
  }

  document.getElementById("chat").appendChild(li);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function loadMessages(){
  // Listen for new messages (child_added)
  db.ref("messages/"+room).limitToLast(100)
    .on("child_added", data => {
      const msg = data.val();
      // Display the message first
      displayMessage(msg, data.key);
      
      // Call title hint + sound logic: pass message sender's name
      handleNewMessage(msg.name);
    });

  // Listen for message deletion
  db.ref("messages/"+room)
    .on("child_removed", data => {
      let li = document.getElementById("msg-"+data.key);
      if(li) li.remove();
    });
}
</script>

</body>
</html>
