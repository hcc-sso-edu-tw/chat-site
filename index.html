<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #7c6af7;
  --primary-dark: #5f50d4;
  --primary-light: #ede9ff;
  --bg: #f4f2fb;
  --chat-bg: #eceaf6;
  --header-bg: #fff;
  --bubble-self: #d6f0e4;
  --bubble-other: #fff;
  --text: #1c1b2e;
  --muted: #7b7a90;
  --border: #e2e0f0;
  --online: #22c55e;
  --shadow-sm: 0 1px 4px rgba(100,80,220,0.08);
  --shadow-md: 0 4px 20px rgba(100,80,220,0.13);
  --radius: 18px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  transition: background 0.3s, color 0.3s;
}

[data-dark] {
  --bg: #13121f;
  --chat-bg: #0f0e1a;
  --header-bg: #1c1b2e;
  --bubble-self: #1b3d2e;
  --bubble-other: #1c1b2e;
  --text: #e8e6f8;
  --muted: #7b7a90;
  --border: #2a2840;
  --primary-light: #2a2550;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.35);
}

body {
  font-family: var(--font);
  background: var(--bg);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--text);
  transition: background 0.3s, color 0.3s;
}

/* ── HEADER ── */
.header {
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  z-index: 10;
  transition: background 0.3s, border-color 0.3s;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--primary-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: background 0.3s;
}
.header-title { font-size: 1rem; font-weight: 600; color: var(--text); }
.header-sub { font-size: 0.72rem; color: var(--muted); }
.header-actions { display: flex; align-items: center; gap: 4px; }
.hbtn {
  width: 34px; height: 34px; border-radius: 10px;
  border: none; background: none; cursor: pointer;
  color: var(--muted); font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  position: relative;
}
.hbtn:hover { background: var(--primary-light); color: var(--primary); }
#deleteRoomBtn {
  background: none; border: none; cursor: pointer;
  color: #dc2626; padding: 6px 12px; border-radius: 8px;
  font-family: var(--font); font-size: 0.8rem; font-weight: 500;
  display: none;
  transition: background 0.15s;
}
#deleteRoomBtn:hover { background: #fee2e2; }

/* ── ONLINE TOOLTIP ── */
#onlineTooltip {
  position: absolute; top: 42px; right: 0;
  background: var(--header-bg);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 8px 12px;
  box-shadow: var(--shadow-md);
  min-width: 130px; z-index: 100;
  display: none;
  font-size: 0.8rem; color: var(--text);
  transition: background 0.3s;
}
#onlineTooltip.show { display: block; }
#onlineTooltip li { list-style: none; padding: 3px 0; display: flex; align-items: center; gap: 6px; }
#onlineTooltip li::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--online); display: inline-block; flex-shrink: 0; }

/* ── OFFLINE BANNER ── */
#offlineBanner {
  background: #fef3c7; color: #92400e;
  text-align: center; padding: 5px;
  font-size: 0.82rem; font-weight: 500;
  display: none; flex-shrink: 0;
}

/* ── PINNED BANNER ── */
#pinnedBar {
  display: none;
  background: var(--primary-light);
  border-bottom: 1px solid var(--border);
  padding: 7px 16px;
  font-size: 0.82rem; color: var(--text);
  align-items: center; gap: 8px;
  flex-shrink: 0;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
}
#pinnedBar span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#pinnedBar .pin-icon { font-size: 0.9rem; flex-shrink: 0; }
#pinnedBar .pin-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.9rem; flex-shrink: 0; padding: 0; }

/* ── JOIN SCREEN ── */
#join {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.join-card {
  background: var(--header-bg);
  border-radius: 22px; padding: 36px 32px;
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow-md);
  display: flex; flex-direction: column; gap: 14px;
  transition: background 0.3s;
}
.join-card h2 { font-size: 1.3rem; font-weight: 600; text-align: center; color: var(--text); }
.join-card p { font-size: 0.84rem; color: var(--muted); text-align: center; margin-top: -6px; }
.join-card input {
  font-family: var(--font);
  border-radius: 12px; border: 1.5px solid var(--border);
  padding: 11px 14px; font-size: 0.93rem;
  background: var(--bg); color: var(--text);
  outline: none; transition: border 0.2s, background 0.3s;
  width: 100%;
}
.join-card input:focus { border-color: var(--primary); }
.join-btn {
  background: var(--primary); color: #fff;
  border: none; border-radius: 12px;
  padding: 13px; font-size: 1rem; font-weight: 600;
  font-family: var(--font); cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.join-btn:hover { background: var(--primary-dark); }
.join-btn:active { transform: scale(0.98); }

/* ── CHAT ROOM ── */
#chatRoom {
  flex: 1; display: none; flex-direction: column;
  max-width: 800px; width: 100%; margin: 0 auto;
  overflow: hidden;
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px 6px;
  background: var(--bg);
  flex-shrink: 0;
  transition: background 0.3s;
}
#onlineWrap { position: relative; }
#onlineBtn {
  font-size: 0.8rem; color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  font-family: var(--font); padding: 4px 8px; border-radius: 8px;
  transition: background 0.15s;
}
#onlineBtn:hover { background: var(--primary-light); color: var(--primary); }
.online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--online); animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#searchMsg {
  font-family: var(--font); padding: 7px 14px;
  border-radius: 20px; border: 1.5px solid var(--border);
  font-size: 0.83rem; outline: none;
  background: var(--header-bg); color: var(--text);
  width: 170px; transition: border 0.2s, width 0.3s, background 0.3s;
  margin-left: auto;
}
#searchMsg:focus { border-color: var(--primary); width: 210px; }

/* ── LOAD MORE ── */
#loadMoreBtn {
  align-self: center;
  background: var(--header-bg);
  border: 1.5px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-size: 0.78rem; color: var(--muted);
  font-family: var(--font); cursor: pointer;
  margin: 8px 0 4px; transition: background 0.15s, color 0.15s;
  display: none;
}
#loadMoreBtn:hover { background: var(--primary-light); color: var(--primary); }

/* ── CHAT LIST ── */
#chat {
  list-style: none; padding: 8px 16px 4px;
  flex: 1; overflow-y: auto;
  background: var(--chat-bg);
  scroll-behavior: smooth;
  display: flex; flex-direction: column; gap: 1px;
  transition: background 0.3s;
}
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: rgba(124,106,247,0.25); border-radius: 4px; }

/* ── TYPING ── */
#typingIndicator {
  font-size: 0.76rem; color: var(--muted);
  min-height: 20px; padding: 2px 18px 3px;
  background: var(--chat-bg); font-style: italic;
  flex-shrink: 0; transition: background 0.3s;
}

/* ── REPLY BANNER ── */
#replyBanner {
  display: none; align-items: center; gap: 10px;
  padding: 7px 16px;
  background: var(--primary-light);
  border-left: 3px solid var(--primary);
  flex-shrink: 0; transition: background 0.3s;
}
#replyBanner .reply-preview { flex: 1; font-size: 0.81rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#replyBanner .reply-label { font-size: 0.72rem; color: var(--primary); font-weight: 600; }
#cancelReply { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0 4px; }

/* ── INPUT ── */
.input-area { padding: 8px 16px 12px; background: var(--bg); flex-shrink: 0; transition: background 0.3s; }
#emojiPicker {
  display: none; flex-wrap: wrap; gap: 3px;
  background: var(--header-bg); border-radius: 14px;
  border: 1.5px solid var(--border);
  padding: 8px; margin-bottom: 7px;
  max-height: 148px; overflow-y: auto;
  box-shadow: var(--shadow-md);
  animation: fadeUp 0.15s ease;
  transition: background 0.3s;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
#emojiPicker span { cursor: pointer; font-size: 1.25rem; padding: 4px; border-radius: 7px; transition: background 0.1s; line-height: 1; }
#emojiPicker span:hover { background: var(--primary-light); }
.input-row {
  display: flex; gap: 6px; align-items: flex-end;
  background: var(--header-bg); border-radius: 22px;
  padding: 7px 7px 7px 13px;
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: border 0.2s, background 0.3s;
}
.input-row:focus-within { border-color: var(--primary); }
.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: var(--muted);
  transition: background 0.15s, color 0.15s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--primary-light); color: var(--primary); }
#msg {
  flex: 1; resize: none; border: none; outline: none;
  font-family: var(--font); font-size: 0.93rem;
  min-height: 34px; max-height: 96px;
  line-height: 1.5; background: transparent; color: var(--text);
  padding: 5px 0;
}
#msg::placeholder { color: var(--muted); }
#sendBtn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
  transition: background 0.2s, transform 0.1s;
  box-shadow: 0 2px 10px rgba(124,106,247,0.4);
}
#sendBtn:hover { background: var(--primary-dark); }
#sendBtn:active { transform: scale(0.92); }

/* image upload preview */
#imgPreviewBar {
  display: none; align-items: center; gap: 8px;
  padding: 6px 16px; background: var(--bg); flex-shrink: 0;
  transition: background 0.3s;
}
#imgPreviewThumb { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; border: 1.5px solid var(--border); }
#imgPreviewName { font-size: 0.8rem; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#clearImg { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; }
#fileInput { display: none; }

/* ── DATE SEP ── */
.date-sep {
  align-self: center; font-size: 0.7rem; color: var(--muted);
  background: rgba(180,170,240,0.18); padding: 2px 12px;
  border-radius: 20px; margin: 7px 0;
}

/* ── MESSAGE BUBBLES ── */
.msg { position: relative; max-width: 72%; animation: msgIn 0.2s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px) scale(.97)} to{opacity:1;transform:none} }
.msg.self { align-self: flex-end; }
.msg.other { align-self: flex-start; }
.msg-meta { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.msg.self .msg-meta { justify-content: flex-end; }
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 600; color: #fff; flex-shrink: 0;
  font-family: var(--mono);
}
.name { font-weight: 600; font-size: 0.76rem; color: var(--primary); }
.time { font-size: 0.66rem; color: var(--muted); }
.bubble {
  padding: 8px 13px; border-radius: var(--radius);
  word-wrap: break-word; line-height: 1.52;
  font-size: 0.91rem; color: var(--text);
  box-shadow: var(--shadow-sm); position: relative;
  transition: background 0.3s;
}
.msg.self .bubble { background: var(--bubble-self); border-bottom-right-radius: 5px; }
.msg.other .bubble { background: var(--bubble-other); border-bottom-left-radius: 5px; }
.msg .read-indicator { font-size: 0.65rem; color: var(--primary); margin-top: 2px; text-align: right; }

/* reply quote */
.reply-quote {
  background: rgba(124,106,247,0.09); border-left: 3px solid var(--primary);
  border-radius: 7px; padding: 4px 9px; margin-bottom: 5px;
  font-size: 0.78rem; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.reply-quote strong { color: var(--primary); font-size: 0.73rem; }

/* img in bubble */
.msg-img { max-width: 220px; border-radius: 10px; margin-top: 5px; display: block; cursor: pointer; transition: opacity 0.15s; }
.msg-img:hover { opacity: 0.88; }

/* link */
.bubble a { color: var(--primary); word-break: break-all; }

/* pinned highlight */
.msg.is-pinned .bubble { outline: 2px solid var(--primary); outline-offset: 2px; }

/* ── REACTIONS ── */
.reactions-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.msg.self .reactions-row { justify-content: flex-end; }
.reaction-chip {
  display: flex; align-items: center; gap: 2px;
  background: var(--header-bg); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 2px 7px;
  font-size: 0.78rem; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  color: var(--text);
}
.reaction-chip:hover { background: var(--primary-light); border-color: var(--primary); }
.reaction-chip.mine { background: var(--primary-light); border-color: var(--primary); }

/* reaction picker popup */
.reaction-picker {
  position: absolute; bottom: calc(100% + 6px);
  left: 0; z-index: 50;
  background: var(--header-bg); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 6px 8px;
  box-shadow: var(--shadow-md);
  display: flex; gap: 4px;
  animation: fadeUp 0.12s ease;
  transition: background 0.3s;
}
.msg.self .reaction-picker { left: auto; right: 0; }
.reaction-picker span { cursor: pointer; font-size: 1.2rem; padding: 4px; border-radius: 8px; transition: background 0.1s; line-height: 1; }
.reaction-picker span:hover { background: var(--primary-light); }

/* ── ACTION BUTTONS (hover) ── */
.msg-actions {
  position: absolute; top: 50%; transform: translateY(-50%);
  display: flex; gap: 2px; opacity: 0;
  transition: opacity 0.15s;
}
.msg.self .msg-actions { right: 100%; margin-right: 4px; }
.msg.other .msg-actions { left: 100%; margin-left: 4px; }
.msg:hover .msg-actions { opacity: 1; }
.action-mini {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--header-bg); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.8rem; color: var(--muted);
  transition: background 0.12s, color 0.12s; flex-shrink: 0;
}
.action-mini:hover { background: var(--primary-light); color: var(--primary); }

/* search highlight */
.msg.highlight .bubble { outline: 2px solid #f59e0b; outline-offset: 2px; }

/* read tooltip */
.read-indicator {
  position: relative;
  display: inline-block;
  cursor: default;
}
.read-tooltip {
  position: absolute;
  bottom: calc(100% + 4px);
  right: 0;
  background: var(--header-bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 5px 10px;
  font-size: 0.75rem;
  color: var(--text);
  white-space: nowrap;
  box-shadow: var(--shadow-md);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.15s, transform 0.15s;
  min-width: 80px;
  line-height: 1.6;
}
.read-indicator:hover .read-tooltip { opacity: 1; transform: translateY(0); }

/* scroll btn */
#scrollBtn {
  position: fixed; bottom: 84px; right: 24px;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none;
  cursor: pointer; font-size: 1rem;
  box-shadow: var(--shadow-md);
  display: none; align-items: center; justify-content: center;
  z-index: 20;
}
#scrollBtn.visible { display: flex; }

/* image lightbox */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 200;
  align-items: center; justify-content: center;
  cursor: pointer;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }

/* notification badge */
#notifBtn .badge {
  position: absolute; top: 2px; right: 2px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #ef4444; display: none;
}
#notifBtn.has-notif .badge { display: block; }

@media (max-width: 600px) {
  .msg { max-width: 86%; }
  #searchMsg { width: 120px; }
  #searchMsg:focus { width: 150px; }
  .join-card { padding: 26px 18px; }
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">💬</div>
    <div>
      <div class="header-title">Chat Room</div>
      <div class="header-sub" id="roomLabel">Join a room to start chatting</div>
    </div>
  </div>
  <div class="header-actions">
    <!-- Online users -->
    <div id="onlineWrap" style="position:relative;">
      <button class="hbtn" id="onlineBtn" onclick="toggleOnlineTooltip()">
        <span class="online-dot"></span>&nbsp;<span id="onlineCount">0</span>
      </button>
      <div id="onlineTooltip"><ul id="onlineList"></ul></div>
    </div>
    <!-- Dark mode -->
    <button class="hbtn" id="darkBtn" onclick="toggleDark()" title="Dark mode">🌙</button>
    <!-- Sound toggle -->
    <button class="hbtn" id="notifBtn" onclick="toggleSound()" title="Sound">
      🔔<span class="badge"></span>
    </button>
    <!-- Delete room -->
    <button id="deleteRoomBtn" onclick="deleteRoom()">🗑 Delete room</button>
  </div>
</div>

<div id="offlineBanner">⚠️ You are offline. Some features may not work.</div>

<!-- PINNED MESSAGE BAR -->
<div id="pinnedBar">
  <span class="pin-icon">📌</span>
  <span id="pinnedText">—</span>
  <button class="pin-close" onclick="unpin(event)">✕</button>
</div>

<!-- JOIN SCREEN -->
<div id="join">
  <div class="join-card">
    <h2>Welcome 👋</h2>
    <p>Enter a room name and display name to start chatting.</p>
    <input id="room" placeholder="Room name" autocomplete="off">
    <input id="joinName" placeholder="Your name" autocomplete="off">
    <button class="join-btn" onclick="joinRoom()">Join Room →</button>
  </div>
</div>

<!-- CHAT ROOM -->
<div id="chatRoom">
  <div class="toolbar">
    <input type="text" id="searchMsg" placeholder="🔍 Search…">
  </div>

  <!-- Image preview bar -->
  <div id="imgPreviewBar">
    <img id="imgPreviewThumb" src="" alt="">
    <span id="imgPreviewName">image.jpg</span>
    <button id="clearImg" onclick="clearImage()">✕</button>
  </div>

  <ul id="chat">
    <li style="align-self:center">
      <button id="loadMoreBtn" onclick="loadMore()">⬆ Load more</button>
    </li>
  </ul>

  <div id="typingIndicator"></div>

  <div id="replyBanner">
    <div>
      <div class="reply-label">↩ Replying to</div>
      <div class="reply-preview" id="replyPreview">…</div>
    </div>
    <button id="cancelReply" onclick="cancelReply()">✕</button>
  </div>

  <div class="input-area">
    <div id="emojiPicker"></div>
    <div class="input-row">
      <button class="icon-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload image">📎</button>
      <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(event)">
      <textarea id="msg" placeholder="Type a message…" maxlength="1000" rows="1"></textarea>
      <button id="sendBtn" onclick="send()" aria-label="送出">➤</button>
    </div>
  </div>
</div>

<!-- FIX: scrollBtn now calls global window.scrollToBottom -->
<button id="scrollBtn" onclick="window.scrollToBottom(true)">↓</button>

<!-- Lightbox -->
<div id="lightbox" onclick="document.getElementById('lightbox').classList.remove('open')">
  <img id="lightboxImg" src="" alt="">
</div>

<audio id="ring" preload="auto">

/* ── IMAGE UPLOAD ── */
function compressImage(file, maxPx, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (ev) => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else       { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

  btn.disabled = true; btn.textContent = '…';
  compressImage(file, 800, 0.75).then(dataUrl => {

    document.getElementById('imgPreviewName').textContent = file.name;
    document.getElementById('imgPreviewBar').style.display = 'flex';
    btn.disabled = false; btn.textContent = '➤';
  }).catch(() => { alert('Failed to process image'); btn.disabled = false; btn.textContent = '➤'; });
  e.target.value = '';
};

/* ── TIME ── */
function formatTime(t) { return new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function formatDate(t) { return new Date(t).toLocaleDateString([],{month:'short',day:'numeric'}); }

/* ── ESC ── */
function esc(s) {
  return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

/* ── DISPLAY MESSAGE ── */
let lastDateSep = '';
function displayMessage(m, key, prepend=false) {
  if (loadedKeys.has(key)) return;
  loadedKeys.add(key);

  const chatUl = document.getElementById('chat');
  const name = localStorage.getItem('chatName') || '';
  const isSelf = (m.name === name);

  if (!prepend) {
    const dateStr = formatDate(m.time);
    if (dateStr !== lastDateSep) {
      lastDateSep = dateStr;
      const sep = document.createElement('li');
      sep.className = 'date-sep';
      sep.textContent = dateStr;
      chatUl.appendChild(sep);
    }
  }

  const li = document.createElement('li');
  li.id = 'msg-'+key;
  li.className = 'msg '+(isSelf?'self':'other');

  const rawMsg = m.msg || '';
  let escapedMsg = esc(rawMsg).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  let imgHtml = '';
  let pendingImgSrc = null;

  if (m.imageData) {
    imgHtml = `<img class="msg-img" id="img-${key}" alt="image" loading="lazy">`;
    pendingImgSrc = m.imageData;
  } else {
    const imgMatch = rawMsg.match(/(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp))(\?[^\s]*)?/i);
    if (imgMatch) imgHtml = `<img class="msg-img" src="${esc(imgMatch[0])}" alt="image" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox(this.src)">`;
  }

  let replyHtml = '';
  if (m.replyTo) replyHtml = `<div class="reply-quote"><strong>${esc(m.replyTo.name)}</strong>: ${esc(m.replyTo.msg)}</div>`;

  const avatarHtml = !isSelf ? `<div class="avatar" style="background:${avatarColor(m.name)}">${avatarInitials(m.name)}</div>` : '';

  li.innerHTML = `
    <div class="msg-meta">
      ${avatarHtml}
      ${!isSelf ? `<span class="name">${esc(m.name)}</span>` : ''}
      <span class="time">${formatTime(m.time)}</span>
    </div>
    <div class="bubble">
      ${replyHtml}
      <span class="msg-content">${escapedMsg}</span>
      ${imgHtml}
    </div>
    <div class="read-indicator" id="read-${key}"><span class="read-tooltip"></span></div>
  `;

  if (pendingImgSrc) {
    const imgEl = li.querySelector('#img-' + key);
    if (imgEl) {
      imgEl.src = pendingImgSrc;
      imgEl.onerror = () => { imgEl.style.display = 'none'; };
      imgEl.onclick = () => openLightbox(imgEl.src);
    }
  }

  // Action buttons
  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  const reactBtn = document.createElement('button');
  reactBtn.className = 'action-mini'; reactBtn.title = 'React'; reactBtn.textContent = '😄';
  reactBtn.onclick = (e) => { e.stopPropagation(); showReactionPicker(key, li); };
  actions.appendChild(reactBtn);

  const replyBtn = document.createElement('button');
  replyBtn.className = 'action-mini'; replyBtn.title = 'Reply'; replyBtn.textContent = '↩';
  replyBtn.onclick = (e) => { e.stopPropagation(); startReply(key, m.name, rawMsg.slice(0,80)); };
  actions.appendChild(replyBtn);

  const pinBtn = document.createElement('button');
  pinBtn.className = 'action-mini'; pinBtn.title = 'Pin'; pinBtn.textContent = '📌';
  pinBtn.onclick = (e) => { e.stopPropagation(); pinMessage(key, rawMsg || '[image]'); };
  actions.appendChild(pinBtn);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'action-mini'; copyBtn.title = 'Copy'; copyBtn.textContent = '📋';
  copyBtn.onclick = (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(rawMsg).then(()=>{ copyBtn.textContent='✅'; setTimeout(()=>copyBtn.textContent='📋',1200); }).catch(()=>{});
  };
  actions.appendChild(copyBtn);

  if (isSelf) {
    const delBtn = document.createElement('button');
    delBtn.className = 'action-mini'; delBtn.title = 'Delete'; delBtn.textContent = '🗑';
    delBtn.onclick = (e) => { e.stopPropagation(); if (confirm('Delete this message?')) db.ref('messages/'+room+'/'+key).remove(); };
    actions.appendChild(delBtn);
  }

  li.appendChild(actions);

  if (prepend) {
    const loadMoreLi = chatUl.querySelector('#loadMoreBtn')?.closest('li');
    if (loadMoreLi) chatUl.insertBefore(li, loadMoreLi.nextSibling);
    else chatUl.insertBefore(li, chatUl.firstChild);
  } else {
    chatUl.appendChild(li);
  }

  // Read receipts
  const readSpan = document.getElementById('read-'+key);
  const readRef = db.ref('readReceipts/'+room+'/'+key);
  const cl = readRef.on('value', snap => {
    if (!snap.exists()) { readSpan.textContent = ''; readSpan._readers = []; return; }
    // Each child: key=userId, value=readerName (display name)
    const readers = [];
    snap.forEach(c => { if (c.val() && typeof c.val() === 'string') readers.push(c.val()); });
    readSpan._readers = readers;
    readSpan.textContent = readers.length > 0 ? '👁 ' + readers.length : '';
    // Update tooltip
    const tip = readSpan.querySelector('.read-tooltip');
    if (tip) { tip.style.whiteSpace = 'pre'; tip.textContent = readers.length > 0 ? 'Seen by: ' + readers.join(', ') : ''; }
  });
  readListeners.set(key, () => readRef.off('value', cl));

  // Mark as read — store display name as value so tooltip can show who read it
  function markRead(msgKey) {
    const ref = db.ref('readReceipts/'+room+'/'+msgKey+'/'+userId);
    ref.once('value', snap => {
      if (!snap.exists()) ref.set(localStorage.getItem('chatName') || userId);
    });
  }

  if (!isSelf) {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          markRead(key);
          obs.unobserve(entry.target);
          messageObservers.delete(key);
        }
      });
    }, { threshold: 0.6 });
    obs.observe(li);
    messageObservers.set(key, obs);
  } else {
    markRead(key);
  }

  setupReactionListener(key);
  if (!prepend && !isSelf) window.scrollToBottom(false);
  if (!prepend) oldestKey = oldestKey || key;
}

/* ── REACTION PICKER ── */
function showReactionPicker(key, li) {
  if (openReactionPicker) { openReactionPicker.remove(); openReactionPicker = null; }
  const picker = document.createElement('div');
  picker.className = 'reaction-picker';
  REACTIONS.forEach(emoji => {
    const s = document.createElement('span'); s.textContent = emoji;
    s.onclick = (e) => { e.stopPropagation(); toggleReaction(key, emoji); picker.remove(); openReactionPicker = null; };
    picker.appendChild(s);
  });
  li.querySelector('.bubble').appendChild(picker);
  openReactionPicker = picker;
  setTimeout(() => document.addEventListener('click', function h(e){
    if (!e.target.closest('.reaction-picker')) { picker.remove(); openReactionPicker=null; document.removeEventListener('click',h); }
  }), 10);
}

/* ── LIGHTBOX ── */
window.openLightbox = function(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
};

/* ── LOAD MESSAGES ── */
function loadMessages() {
  messageObservers.forEach(o=>o.disconnect()); messageObservers.clear();
  readListeners.forEach(u=>u()); readListeners.clear();

  db.ref('messages/'+room).limitToLast(PAGE_SIZE).on('child_added', data => {
    const msg = data.val(), key = data.key;
    if (!oldestKey) oldestKey = key;
    displayMessage(msg, key);
    if (msg.name !== localStorage.getItem('chatName') && !isInitialLoad) {
      playRing(); handleNewMsg(msg.name);
    }
  });

  db.ref('messages/'+room).once('value', snap => {
    isInitialLoad = false;
    setTimeout(() => window.scrollToBottom(true), 100);
    if (snap.numChildren() >= PAGE_SIZE) {
      document.getElementById('loadMoreBtn').style.display = 'block';
      loadMoreCursor = oldestKey;
    }
  });

  db.ref('messages/'+room).on('child_removed', data => {
    const key = data.key;
    const li = document.getElementById('msg-'+key); if (li) li.remove();
    if (messageObservers.has(key)) { messageObservers.get(key).disconnect(); messageObservers.delete(key); }
    if (readListeners.has(key)) { readListeners.get(key)(); readListeners.delete(key); }
    loadedKeys.delete(key);
  });
}

/* ── LOAD MORE ── */
window.loadMore = function() {
  if (!loadMoreCursor) return;
  const btn = document.getElementById('loadMoreBtn');
  btn.textContent = 'Loading…'; btn.disabled = true;
  db.ref('messages/'+room).orderByKey().endBefore(loadMoreCursor).limitToLast(LOAD_MORE_SIZE)
    .once('value', snap => {
      if (!snap.exists()) { btn.style.display='none'; return; }
      const entries = [];
      snap.forEach(c => entries.push({ key: c.key, val: c.val() }));
      if (entries.length < LOAD_MORE_SIZE) { btn.style.display='none'; }
      else { loadMoreCursor = entries[0].key; btn.textContent='⬆ Load more'; btn.disabled=false; }
      const prevScroll = chatEl.scrollHeight;
      entries.reverse().forEach(e => displayMessage(e.val, e.key, true));
      chatEl.scrollTop = chatEl.scrollHeight - prevScroll;
      if (entries.length < LOAD_MORE_SIZE) btn.style.display='none';
    });
};

/* ── SEARCH ── */
let searchTimeout;
document.getElementById('searchMsg').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const kw = this.value.trim().toLowerCase();
    document.querySelectorAll('#chat .msg').forEach(msg => {
      const content = msg.querySelector('.msg-content');
      if (!content) return;
      const match = kw==='' || content.textContent.toLowerCase().includes(kw);
      msg.classList.toggle('highlight', kw!=='' && !match);
      if (kw!=='' && match) msg.scrollIntoView({ behavior:'smooth', block:'nearest' });
    });
  }, 250);
});

/* ── KEYBOARD ── */
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    const s = this.selectionStart;
    this.value = this.value.substring(0, s) + '\n' + this.value.substring(s);
    this.selectionStart = this.selectionEnd = s + 1;
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
    e.preventDefault();
    window.send();
  }
});
document.getElementById('room').addEventListener('keypress', e => { if (e.key==='Enter') window.joinRoom(); });
document.getElementById('joinName').addEventListener('keypress', e => { if (e.key==='Enter') window.joinRoom(); });

document.addEventListener('click', e => {
  if (!e.target.closest('.input-actions') && !e.target.closest('#emojiPicker')) {
    emojiPicker.style.display = 'none';
  }
});

})();
</script>
</body>
