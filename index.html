<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat site</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 30px;
  color: #333;
}

#join, #chatRoom {
  max-width: 500px;
  margin: 20px auto;
}

input {
  padding: 10px;
  margin: 5px 0;
  width: calc(100% - 22px);
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  font-size: 14px;
  border: none;
  background: #555;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background: #444;
}

#chat {
  list-style: none;
  padding: 0;
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  height: 300px;
  overflow-y: auto;
  border: 1px solid #ccc;
  background: white;
  border-radius: 5px;
}

#chat li {
  margin: 5px;
  padding: 8px 12px;
  border-bottom: 1px solid #eee;
  border-radius: 4px;
  word-wrap: break-word;
}

#chat li:last-child {
  border-bottom: none;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h1>Chat site</h1>

<!-- 進入群組畫面 -->
<div id="join">
  <input id="room" placeholder="Enter group name">
  <button onclick="joinRoom()">Join Group</button>
</div>

<!-- 聊天室 -->
<div id="chatRoom" style="display:none;">
  <input id="name" placeholder="Your name">
  <input id="msg" placeholder="Enter message">
  <ul id="chat"></ul>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCqKKmfHbyMrLwxthpY7YAoNqbekWBOuYk",
  authDomain: "chat-site-12345.firebaseapp.com",
  databaseURL: "https://chat-site-12345-default-rtdb.firebaseio.com",
  projectId: "chat-site-12345",
  storageBucket: "chat-site-12345.firebasestorage.app",
  messagingSenderId: "660571630838",
  appId: "1:660571630838:web:7be88b3d899720ba1590d7",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room="";

function joinRoom(){
  room = document.getElementById("room").value.trim();
  if(room=="") return;

  document.getElementById("join").style.display = "none";
  document.getElementById("chatRoom").style.display = "block";

  loadMessages();
}

// 監聽Enter鍵送訊息
document.getElementById("msg").addEventListener("keypress", function(e) {
  if(e.key === "Enter") send();
});

function send(){
  let name = document.getElementById("name").value.trim();
  let msg = document.getElementById("msg").value.trim();

  if(name=="" || msg=="") return;

  db.ref("messages/" + room).push({
    name: name,
    msg: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

function loadMessages(){
  db.ref("messages/" + room).on("child_added", function(data){
    let message = data.val();
    let li = document.createElement("li");
    li.textContent = message.name + ": " + message.msg;
    document.getElementById("chat").appendChild(li);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  });
}
</script>

</body>
</html>
