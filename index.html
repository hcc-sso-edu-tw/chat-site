<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#join,#chatRoom{
max-width:500px;
margin:auto;
}

input{
padding:10px;
margin:5px;
width:95%;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#444;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#333;
}

#chat{
list-style:none;
padding:0;
height:350px;
overflow-y:auto;
border:1px solid #ccc;
background:white;
border-radius:6px;
text-align:left;
}

#chat li{
padding:8px;
border-bottom:1px solid #eee;
}

img,video{
max-width:200px;
border-radius:5px;
display:block;
margin-top:5px;
}

</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

</head>

<body>

<h1>Chat Room</h1>

<div id="join">

<input id="room" placeholder="Enter group name">
<button onclick="joinRoom()">Join</button>

</div>

<div id="chatRoom" style="display:none">

<input id="name" placeholder="Your name">
<input id="msg" placeholder="Message">
<input type="file" id="file">

<button onclick="send()">Send</button>
<button onclick="uploadFile()">Upload</button>

<ul id="chat"></ul>

</div>

<script>

const firebaseConfig={
  apiKey: "AIzaSyCqKKmfHbyMrLwxthpY7YAoNqbekWBOuYk",
  authDomain: "chat-site-12345.firebaseapp.com",
  databaseURL: "https://chat-site-12345-default-rtdb.firebaseio.com",
  projectId: "chat-site-12345",
  storageBucket: "chat-site-12345.firebasestorage.app",
  messagingSenderId: "660571630838",
  appId: "1:660571630838:web:7be88b3d899720ba1590d7 "
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const storage=firebase.storage();

let room="";

document.getElementById("name").value=
localStorage.getItem("chatName") || "";

function joinRoom(){

room=document.getElementById("room").value.trim();

if(room=="") return;

document.getElementById("join").style.display="none";
document.getElementById("chatRoom").style.display="block";

loadMessages();

}

document.getElementById("room").addEventListener("keypress",function(e){
if(e.key==="Enter") joinRoom();
});

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter") send();
});

function send(){

let name=document.getElementById("name").value.trim();
let msg=document.getElementById("msg").value.trim();

if(name==""||msg=="") return;

localStorage.setItem("chatName",name);

db.ref("messages/"+room).push({
name:name,
msg:msg,
time:Date.now()
});

document.getElementById("msg").value="";

}

function uploadFile(){

let file=document.getElementById("file").files[0];
let name=document.getElementById("name").value.trim();

if(!file||name=="") return;

localStorage.setItem("chatName",name);

let ref=storage.ref("files/"+Date.now()+"_"+file.name);

ref.put(file).then(snap=>{

snap.ref.getDownloadURL().then(url=>{

db.ref("messages/"+room).push({
name:name,
file:url,
type:file.type,
time:Date.now()
});

});

});

}

function loadMessages(){

db.ref("messages/"+room).on("child_added",data=>{

let m=data.val();

let li=document.createElement("li");

if(m.msg){

li.textContent=m.name+": "+m.msg;

}

if(m.file){

let label=document.createElement("div");
label.textContent=m.name+": ";

li.appendChild(label);

if(m.type.startsWith("image")){

let img=document.createElement("img");
img.src=m.file;

img.onclick=()=>window.open(m.file);

li.appendChild(img);

}

else if(m.type.startsWith("video")){

let v=document.createElement("video");
v.src=m.file;
v.controls=true;

li.appendChild(v);

}

else{

let a=document.createElement("a");
a.href=m.file;
a.textContent="Download file";
a.target="_blank";

li.appendChild(a);

}

}

document.getElementById("chat").appendChild(li);

let chat=document.getElementById("chat");
chat.scrollTop=chat.scrollHeight;

});

}

</script>

</body>
</html>
