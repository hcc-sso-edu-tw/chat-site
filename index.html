<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#join,#chatRoom{
max-width:500px;
margin:auto;
}

input{
padding:10px;
margin:5px;
width:95%;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
background:#444;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#333;
}

#chat{
list-style:none;
padding:0;
height:350px;
overflow-y:auto;
border:1px solid #ccc;
background:white;
border-radius:6px;
text-align:left;
}

#chat li{
padding:8px;
border-bottom:1px solid #eee;
}

</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h1>Chat Room</h1>

<div id="join">

<input id="room" placeholder="Enter group name">
<button onclick="joinRoom()">Join</button>

</div>

<div id="chatRoom" style="display:none">

<input id="name" placeholder="Your name">
<input id="msg" placeholder="Message">

<button onclick="send()">Send</button>

<ul id="chat"></ul>

</div>

<script>

const firebaseConfig={
  apiKey: "AIzaSyCqKKmfHbyMrLwxthpY7YAoNqbekWBOuYk",
  authDomain: "chat-site-12345.firebaseapp.com",
  databaseURL: "https://chat-site-12345-default-rtdb.firebaseio.com",
  projectId: "chat-site-12345",
  messagingSenderId: "660571630838",
  appId: "1:660571630838:web:7be88b3d899720ba1590d7"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let room="";

document.getElementById("name").value=
localStorage.getItem("chatName") || "";

function joinRoom(){

room=document.getElementById("room").value.trim();

if(room=="") return;

document.getElementById("join").style.display="none";
document.getElementById("chatRoom").style.display="block";

loadMessages();

}

document.getElementById("room").addEventListener("keypress",function(e){
if(e.key==="Enter") joinRoom();
});

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter") send();
});

function send(){

let name=document.getElementById("name").value.trim();
let msg=document.getElementById("msg").value.trim();

if(name==""||msg=="") return;

localStorage.setItem("chatName",name);

db.ref("messages/"+room).push({
name:name,
msg:msg,
time:Date.now()
});

document.getElementById("msg").value="";

}

function loadMessages(){

db.ref("messages/"+room).on("child_added",data=>{

let m=data.val();

let li=document.createElement("li");

li.textContent=m.name+": "+m.msg;

document.getElementById("chat").appendChild(li);

let chat=document.getElementById("chat");
chat.scrollTop=chat.scrollHeight;

});

}

</script>

</body>
</html>
