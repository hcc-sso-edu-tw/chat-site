<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<style>
body{
font-family:Arial;
background:#f3f3f3;
margin:0;
}

h1{
text-align:center;
margin:20px 0;
}

#join,#chatRoom{
max-width:520px;
margin:auto;
text-align:center;
}

input{
padding:10px;
margin:6px 0;
width:100%;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
padding:10px 18px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
display:block;
margin:10px auto;
}

button:hover{
background:#333;
}

#online{
font-size:13px;
color:#666;
margin-bottom:6px;
}

#typing{
font-size:12px;
color:#888;
height:16px;
}

#chat{
list-style:none;
padding:0;
height:360px;
overflow-y:auto;
border:1px solid #ccc;
background:white;
border-radius:6px;
}

.msg{
position:relative;
padding:8px 10px;
border-bottom:1px solid #eee;
max-width:80%;
margin:4px;
border-radius:6px;
word-wrap:break-word;
}

.msg.self{
background:#DCF8C6;
margin-left:auto;
text-align:right;
padding-left:34px;
}

.msg.other{
background:#FFF;
margin-right:auto;
}

.msg .name{
font-weight:bold;
}

.msg .time{
color:#888;
font-size:12px;
margin-left:6px;
}

.replyBox{
font-size:12px;
background:#eee;
padding:4px;
border-radius:4px;
margin-bottom:4px;
}

.delete-dots{
position:absolute;
top:4px;
left:6px;
width:22px;
height:22px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.08);
border-radius:50%;
font-size:14px;
cursor:pointer;
}

.menu{
position:absolute;
background:white;
border:1px solid #ccc;
border-radius:6px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
font-size:14px;
z-index:100;
}

.menu div{
padding:6px 12px;
cursor:pointer;
}

.menu div:hover{
background:#eee;
}

.reactions{
font-size:13px;
margin-top:3px;
}

.reactions span{
margin-right:6px;
}

#pinned{
background:#fff3cd;
border:1px solid #ffeeba;
padding:6px;
border-radius:6px;
margin-bottom:6px;
display:none;
position:relative;
}

#unpin{
position:absolute;
right:6px;
top:4px;
cursor:pointer;
font-size:12px;
color:#666;
}

.row{
display:flex;
gap:6px;
}

#msg{
flex:1;
}

</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<h1>Chat Room</h1>

<div id="join">
<input id="room" placeholder="Enter room name">
<input id="joinName" placeholder="Your name">
<button onclick="joinRoom()">Join Room</button>
</div>

<div id="chatRoom" style="display:none">

<div><b>Your name:</b> <span id="displayName"></span></div>

<div id="pinned">
<span id="pinText"></span>
<span id="unpin" onclick="unpin()">Unpin</span>
</div>

<div id="online">Users online:0</div>
<div id="typing"></div>

<ul id="chat"></ul>

<div class="row">
<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyCqKKmfHbyMrLwxthpY7oYAoNqbekWBOuYk",
authDomain:"chat-site-12345.firebaseapp.com",
databaseURL:"https://chat-site-12345-default-rtdb.firebaseio.com",
projectId:"chat-site-12345",
appId:"1:660571630838:web:7be88b3d899720ba1590d7"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let room="";
let userId=Math.random().toString(36).substr(2,9);
let replyTo=null;
let editKey=null;

let sound;
let audioReady=false;

function initSound(){
sound=new Audio("ring.m4a");
audioReady=true;
}

document.addEventListener("click",()=>{
if(!audioReady) initSound();
},{once:true});

function playSound(){
if(!audioReady) return;
let s=sound.cloneNode();
s.play().catch(()=>{});
}

function joinRoom(){

room=document.getElementById("room").value.trim();
let name=document.getElementById("joinName").value.trim();

if(!room||!name) return;

localStorage.setItem("chatName",name);

document.getElementById("displayName").textContent=name;

document.getElementById("join").style.display="none";
document.getElementById("chatRoom").style.display="block";

trackOnline();
loadMessages();
loadTyping();
loadPinned();

}

function trackOnline(){

const connectedRef=db.ref(".info/connected");

connectedRef.on("value",snap=>{
if(snap.val()===true){
let ref=db.ref("online/"+room+"/"+userId);
ref.set(true);
ref.onDisconnect().remove();
}
});

db.ref("online/"+room).on("value",snap=>{
let c=snap.exists()?snap.numChildren():0;
document.getElementById("online").textContent="Users online:"+c;
});

}

function send(){

let name=localStorage.getItem("chatName");
let msg=document.getElementById("msg").value.trim();

if(!msg) return;

if(editKey){

db.ref("messages/"+room+"/"+editKey).update({
msg:msg,
edited:true
});

editKey=null;

}else{

db.ref("messages/"+room).push({
name:name,
msg:msg,
time:Date.now(),
reply:replyTo||null
});

}

replyTo=null;

document.getElementById("msg").value="";

}

function displayMessage(m,key){

let li=document.createElement("li");
li.className="msg";

let current=localStorage.getItem("chatName");
let self=m.name===current;

li.classList.add(self?"self":"other");

let html="";

if(m.reply){
html+="<div class='replyBox'>↪ reply</div>";
}

html+="<span class='name'>"+m.name+"</span>";
html+="<span class='time'>"+new Date(m.time).toLocaleTimeString()+"</span>";

if(m.edited) html+=" (edited)";

html+="<div>"+m.msg+"</div>";

li.innerHTML=html;

let reactBox=document.createElement("div");
reactBox.className="reactions";

if(m.react){
for(let r in m.react){
let span=document.createElement("span");
span.textContent=r+" "+m.react[r];
reactBox.appendChild(span);
}
}

li.appendChild(reactBox);

let btn=document.createElement("div");
btn.className="delete-dots";
btn.innerText="...";
btn.onclick=(e)=>{
e.stopPropagation();
showMenu(e.pageX,e.pageY,m,key,self);
};

li.appendChild(btn);

document.getElementById("chat").appendChild(li);

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

}

function showMenu(x,y,m,key,self){

let old=document.querySelector(".menu");
if(old) old.remove();

let menu=document.createElement("div");
menu.className="menu";
menu.style.left=x+"px";
menu.style.top=y+"px";

menu.innerHTML=`
<div onclick="copyMsg(\`${m.msg}\`)">Copy</div>
<div onclick="replyMsg('${key}')">Reply</div>
<div onclick="reactMsg('${key}','👍')">👍</div>
<div onclick="reactMsg('${key}','😂')">😂</div>
<div onclick="reactMsg('${key}','❤️')">❤️</div>
${self?`<div onclick="editMsg('${key}',\`${m.msg}\`)">Edit</div>`:""}
${self?`<div onclick="deleteMsg('${key}')">Delete</div>`:""}
<div onclick="pinMsg(\`${m.msg}\`)">Pin</div>
`;

document.body.appendChild(menu);

}

function reactMsg(key,r){

db.ref("messages/"+room+"/"+key+"/react/"+r)
.transaction(v=>(v||0)+1);

document.querySelector(".menu").remove();

}

function copyMsg(t){

navigator.clipboard.writeText(t);
document.querySelector(".menu").remove();

}

function replyMsg(k){

replyTo=k;
document.querySelector(".menu").remove();
document.getElementById("msg").focus();

}

function editMsg(k,t){

editKey=k;
document.getElementById("msg").value=t;
document.querySelector(".menu").remove();

}

function deleteMsg(k){

db.ref("messages/"+room+"/"+k).remove();
document.querySelector(".menu").remove();

}

function pinMsg(msg){

db.ref("pinned/"+room).set(msg);
document.querySelector(".menu").remove();

}

function unpin(){

db.ref("pinned/"+room).remove();

}

function loadPinned(){

db.ref("pinned/"+room).on("value",snap=>{

if(snap.exists()){
document.getElementById("pinned").style.display="block";
document.getElementById("pinText").textContent="📌 "+snap.val();
}else{
document.getElementById("pinned").style.display="none";
}

});

}

function loadMessages(){

db.ref("messages/"+room).limitToLast(100)
.on("child_added",data=>{

displayMessage(data.val(),data.key);

let name=localStorage.getItem("chatName");

if(data.val().name!==name){
playSound();
}

});

}

document.getElementById("msg").addEventListener("input",()=>{

db.ref("typing/"+room+"/"+userId).set(true);

setTimeout(()=>{
db.ref("typing/"+room+"/"+userId).remove();
},2000);

});

function loadTyping(){

db.ref("typing/"+room).on("value",snap=>{

let count=snap.exists()?snap.numChildren():0;

document.getElementById("typing").innerText=
count>0?"Someone is typing...":"";

});

}

</script>

</body>
</html>
