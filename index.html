<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<style>
body{
  font-family:Arial;
  background:#f3f3f3;
  margin:0;
}
h1{
  text-align:center;
  margin:20px 0;
}
#join,#chatRoom{
  max-width:520px;
  margin:auto;
  text-align:center;
}
input{
  padding:10px;
  margin:6px 0;
  width:100%;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}
button{
  padding:10px 18px;
  background:#444;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  display:block;
  margin:10px auto;
}
button:hover{
  background:#333;
}
#online{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}
#chat{
  list-style:none;
  padding:0;
  height:360px;
  overflow-y:auto;
  border:1px solid #ccc;
  background:white;
  border-radius:6px;
}
/* 讓訊息li成為相對定位容器，方便三點鈕絕對定位 */
.msg{
  position: relative;
  padding:8px 10px;
  border-bottom:1px solid #eee;
  max-width:80%;
  margin:4px;
  border-radius:6px;
  cursor:default;
  word-wrap: break-word;
}
.msg .name{
  font-weight:bold;
}
.msg .time{
  color:#888;
  font-size:12px;
  margin-left:6px;
}
.msg.self{
  background:#DCF8C6;
  margin-left:auto;
  text-align:right;
  /* 為左上角刪除按鈕預留左側空間 */
  padding-left: 30px;
}
.msg.other{
  background:#FFF;
  margin-right:auto;
  text-align:left;
}
/* 刪除三點按鈕樣式 (只顯示在自己的訊息左上角) */
.delete-dots {
  position: absolute;
  top: 4px;
  left: 6px;
  cursor: pointer;
  padding: 0 6px 2px 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
  line-height: 1.4;
  color: #555;
  transition: background 0.2s;
  user-select: none;
  z-index: 5;
}
.delete-dots:hover {
  background: rgba(0,0,0,0.2);
  color: #000;
}
/* 訊息內連結樣式 */
.msg a {
  color: #0066cc;
  text-decoration: underline;
  word-break: break-all;
}
.msg a:hover {
  color: #004499;
}
.row{
  display:flex;
  gap:6px;
}
#msg{
  flex:1;
}
/* 新增大標題下方的說明 */
.sub-hint {
  font-size:14px;
  color:#666;
  margin:10px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<h1>Chat Room</h1>

<!-- 修改後的 join 區塊：包含 room 和 name 輸入框 -->
<div id="join">
  <input id="room" placeholder="Enter room name" value="default">
  <input id="joinName" placeholder="Your name" value="">
  <button onclick="joinRoom()">Join Room</button>
  <div class="sub-hint">輸入房間名稱與您的名稱後加入</div>
</div>

<div id="chatRoom" style="display:none">
  <!-- 移除原本的 name 輸入框，改用顯示目前使用者名稱 + 一個小提示 -->
  <div style="margin-bottom:8px; font-weight:bold;">Your name: <span id="displayName"></span></div>
  <div id="online">Users online: 0</div>
  <ul id="chat"></ul>
  <div class="row">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCqKKmfHbyMrLwxthpY7oYAoNqbekWBOuYk",
authDomain:"chat-site-12345.firebaseapp.com",
databaseURL:"https://chat-site-12345-default-rtdb.firebaseio.com",
projectId:"chat-site-12345",
appId:"1:660571630838:web:7be88b3d899720ba1590d7"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let room="";
let userId=Math.random().toString(36).substr(2,9);
// 不再從 localStorage 自動讀取 name，而是從 joinName 輸入框取得

// --- 新訊息鈴聲與標題提示功能 ---
let pageVisible = true;                 // 當前頁面是否可見
let unreadCount = 0;                    // 未讀計數
const originalTitle = document.title;   // 儲存原始標題
let notificationSound = null;            // 音效物件

// 初始化音效 (使用者互動後才能播放，因此先建立但不播放)
function initAudio() {
  if (notificationSound) return;
  try {
    notificationSound = new Audio('ring.m4a');
    notificationSound.preload = 'auto';
    // 測試是否能載入，但不播放
    notificationSound.load();
  } catch (e) {
    console.warn('音效初始化失敗:', e);
  }
}

// 播放提示音 (需要使用者手勢後才能播放)
function playNotificationSound() {
  if (!notificationSound) {
    initAudio();
  }
  if (notificationSound) {
    // 重置播放位置，避免連續訊息只播放一次
    notificationSound.currentTime = 0;
    notificationSound.play().catch(e => {
      // 瀏覽器阻擋自動播放是正常的，靜默處理
      console.log('音效播放被瀏覽器阻擋（需要使用者互動後才能自動播放）');
    });
  }
}

// 監聽頁面可見性變化
document.addEventListener("visibilitychange", function() {
  pageVisible = !document.hidden;
  if (pageVisible) {
    // 回到頁面時清除未讀計數和標題提示
    unreadCount = 0;
    document.title = originalTitle;
  }
});

// 點擊任何地方嘗試初始化音效（解決自動播放策略）
document.addEventListener('click', function once() {
  initAudio();
  document.removeEventListener('click', once);
}, { once: true });

// 當收到新訊息時呼叫此函數（排除自己發送的）
function handleNewMessage(messageSender) {
  const currentUser = localStorage.getItem("chatName") || "";
  
  // 只有當訊息不是自己發的，且頁面隱藏時才提示
  if (messageSender !== currentUser) {
    if (!pageVisible) {
      unreadCount++;
      document.title = `(${unreadCount}) ${originalTitle}`;
      
      // 播放提示音（即使頁面隱藏，瀏覽器通常會阻止，但還是嘗試）
      playNotificationSound();
    } else {
      // 頁面可見時，不播放音效、不改變標題
      // 但如果你想讓可見時也播放（像FB），可以把下面註解拿掉
      // playNotificationSound();
    }
  }
}
// --- 鈴聲與標題提示結束 ---

function joinRoom(){
  // 從新輸入框取得 room 與 name
  room = document.getElementById("room").value.trim();
  let joinName = document.getElementById("joinName").value.trim();
  
  if(!room) {
    alert("請輸入房間名稱");
    return;
  }
  if(!joinName) {
    alert("請輸入您的名稱");
    return;
  }
  
  // 將名稱存入 localStorage 以便後續使用，並顯示在聊天室頂部
  localStorage.setItem("chatName", joinName);
  document.getElementById("displayName").textContent = joinName;
  
  // 隱藏加入區塊，顯示聊天室
  document.getElementById("join").style.display = "none";
  document.getElementById("chatRoom").style.display = "block";
  
  // 追蹤線上人數、載入訊息
  trackOnline();
  loadMessages();
  
  // 加入房間後嘗試初始化音效（使用者點擊了加入按鈕，具備手勢）
  initAudio();
}

function trackOnline(){
  const connectedRef=db.ref(".info/connected");
  connectedRef.on("value",snap=>{
    if(snap.val()===true){
      let ref=db.ref("online/"+room+"/"+userId);
      ref.set(true);
      ref.onDisconnect().remove();
    }
  });
  db.ref("online/"+room).on("value",snap=>{
    let count=0;
    if(snap.exists()) count=snap.numChildren();
    document.getElementById("online").textContent="Users online: "+count;
  });
}

// 修改 Enter 事件：現在監聽 join 頁面的兩個輸入框，但觸發相同函數
document.getElementById("room").addEventListener("keypress",e=>{
  if(e.key==="Enter") joinRoom();
});
document.getElementById("joinName").addEventListener("keypress",e=>{
  if(e.key==="Enter") joinRoom();
});
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

function send(){
  // 直接從 localStorage 取得名稱（已在 joinRoom 時設定）
  let name = localStorage.getItem("chatName") || "";
  let msg = document.getElementById("msg").value.trim();
  if(!name||!msg) return;
  
  let message={name:name,msg:msg,time:Date.now()};
  db.ref("messages/"+room).push(message);
  document.getElementById("msg").value="";
}

function formatTime(t){
  let d=new Date(t);
  let h=d.getHours().toString().padStart(2,"0");
  let m=d.getMinutes().toString().padStart(2,"0");
  return h+":"+m;
}

function displayMessage(m, key){
  let li = document.createElement("li");
  li.id = "msg-" + key;

  let currentName = localStorage.getItem("chatName") || "";
  let isSelf = (m.name === currentName);
  li.className = "msg " + (isSelf ? "self" : "other");

  // --- 將訊息內容轉義，並把 http/https 連結轉為可點擊 ---
  let rawMsg = m.msg || "";
  let escapedMsg = rawMsg.replace(/[&<>"]/g, function(match) {
    if (match === '&') return '&amp;';
    if (match === '<') return '&lt;';
    if (match === '>') return '&gt;';
    if (match === '"') return '&quot;';
    return match;
  });
  // 將 http:// 或 https:// 連結轉成 <a>
  escapedMsg = escapedMsg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

  li.innerHTML = "<span class='name'>" + m.name + "</span>" +
                 "<span class='time'>" + formatTime(m.time) + "</span>" +
                 "<div>" + escapedMsg + "</div>";

  // --- 如果是自己的訊息，加入刪除三點按鈕 (左上角) ---
  if (isSelf && key) {
    let delBtn = document.createElement("span");
    delBtn.className = "delete-dots";
    delBtn.textContent = "...";
    delBtn.addEventListener("click", function(e) {
      e.stopPropagation();
      if (confirm("Delete your message?")) {
        db.ref("messages/" + room + "/" + key).remove();
      }
    });
    li.appendChild(delBtn);
  }

  document.getElementById("chat").appendChild(li);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function loadMessages(){
  // 監聽新訊息 (child_added)
  db.ref("messages/"+room).limitToLast(100)
    .on("child_added", data => {
      const msg = data.val();
      // 先顯示訊息
      displayMessage(msg, data.key);
      
      // 呼叫標題提示 + 鈴聲邏輯：傳入訊息發送者名稱
      handleNewMessage(msg.name);
    });

  // 監聽刪除訊息
  db.ref("messages/"+room)
    .on("child_removed", data => {
      let li = document.getElementById("msg-"+data.key);
      if(li) li.remove();
    });
}
</script>

</body>
</html>
