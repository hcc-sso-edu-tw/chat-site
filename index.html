<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat · 連結可點 · 三點刪除</title>

<style>
body{
  font-family:Arial;
  background:#f3f3f3;
  margin:0;
}
h1{
  text-align:center;
  margin:20px 0;
}
#join,#chatRoom{
  max-width:520px;
  margin:auto;
  text-align:center;
}
input{
  padding:10px;
  margin:6px 0;
  width:100%;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}
button{
  padding:10px 18px;
  background:#444;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  display:block;
  margin:10px auto;
}
button:hover{
  background:#333;
}
#online{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}
#chat{
  list-style:none;
  padding:0;
  height:360px;
  overflow-y:auto;
  border:1px solid #ccc;
  background:white;
  border-radius:6px;
}
/* 讓訊息li成為相對定位容器，方便三點鈕絕對定位 */
.msg{
  position: relative;
  padding:8px 10px;
  border-bottom:1px solid #eee;
  max-width:80%;
  margin:4px;
  border-radius:6px;
  cursor:default;          /* 原本點擊訊息刪除已移除 */
  word-wrap: break-word;
}
.msg .name{
  font-weight:bold;
}
.msg .time{
  color:#888;
  font-size:12px;
  margin-left:6px;
}
.msg.self{
  background:#DCF8C6;
  margin-left:auto;
  text-align:right;
}
.msg.other{
  background:#FFF;
  margin-right:auto;
  text-align:left;
}
/* 刪除三點按鈕樣式 (只用於自己的訊息) */
.delete-dots {
  position: absolute;
  top: 2px;
  right: 5px;
  cursor: pointer;
  padding: 0 6px 2px 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 12px;
  font-weight: bold;
  font-size: 16px;
  line-height: 1.4;
  color: #555;
  transition: background 0.2s;
  user-select: none;
  z-index: 5;
}
.delete-dots:hover {
  background: rgba(0,0,0,0.2);
  color: #000;
}
/* 訊息內連結樣式 */
.msg a {
  color: #0066cc;
  text-decoration: underline;
  word-break: break-all;
}
.msg a:hover {
  color: #004499;
}
.row{
  display:flex;
  gap:6px;
}
#msg{
  flex:1;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>

<h1>Chat Room</h1>

<div id="join">
  <input id="room" placeholder="Enter group name">
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="chatRoom" style="display:none">
  <input id="name" placeholder="Your name">
  <div id="online">Users online: 0</div>
  <ul id="chat"></ul>
  <div class="row">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCqKKmfHbyMrLwxthpY7oYAoNqbekWBOuYk",
authDomain:"chat-site-12345.firebaseapp.com",
databaseURL:"https://chat-site-12345-default-rtdb.firebaseio.com",
projectId:"chat-site-12345",
appId:"1:660571630838:web:7be88b3d899720ba1590d7"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let room="";
let userId=Math.random().toString(36).substr(2,9);
document.getElementById("name").value=localStorage.getItem("chatName")||"";

function joinRoom(){
  room=document.getElementById("room").value.trim();
  if(!room) return;
  document.getElementById("join").style.display="none";
  document.getElementById("chatRoom").style.display="block";
  trackOnline();
  loadMessages();
}

function trackOnline(){
  const connectedRef=db.ref(".info/connected");
  connectedRef.on("value",snap=>{
    if(snap.val()===true){
      let ref=db.ref("online/"+room+"/"+userId);
      ref.set(true);
      ref.onDisconnect().remove();
    }
  });
  db.ref("online/"+room).on("value",snap=>{
    let count=0;
    if(snap.exists()) count=snap.numChildren();
    document.getElementById("online").textContent="Users online: "+count;
  });
}

document.getElementById("room").addEventListener("keypress",e=>{
  if(e.key==="Enter") joinRoom();
});
document.getElementById("msg").addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

function send(){
  let name=document.getElementById("name").value.trim();
  let msg=document.getElementById("msg").value.trim();
  if(!name||!msg) return;
  localStorage.setItem("chatName",name);
  let message={name:name,msg:msg,time:Date.now()};
  db.ref("messages/"+room).push(message);
  document.getElementById("msg").value="";
}

function formatTime(t){
  let d=new Date(t);
  let h=d.getHours().toString().padStart(2,"0");
  let m=d.getMinutes().toString().padStart(2,"0");
  return h+":"+m;
}

/**
 * 顯示單一訊息，並將網址轉為可點擊連結。
 * 自己的訊息右上角會加上「...」刪除按鈕。
 */
function displayMessage(m, key){
  let li = document.createElement("li");
  li.id = "msg-" + key;

  let currentName = localStorage.getItem("chatName") || "";
  let isSelf = (m.name === currentName);
  li.className = "msg " + (isSelf ? "self" : "other");

  // --- 將訊息內容轉義，並把 http/https 連結轉為可點擊 ---
  let rawMsg = m.msg || "";
  // 1. HTML轉義 (防止XSS)
  let escapedMsg = rawMsg.replace(/[&<>"]/g, function(match) {
    if (match === '&') return '&amp;';
    if (match === '<') return '&lt;';
    if (match === '>') return '&gt;';
    if (match === '"') return '&quot;';
    return match;
  });
  // 2. 將 http:// 或 https:// 連結轉成 <a> (簡單正則，可能包含結尾標點，但一般可用)
  escapedMsg = escapedMsg.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

  // 填入基本結構 (name, time, 訊息div)
  li.innerHTML = "<span class='name'>" + m.name + "</span>" +
                 "<span class='time'>" + formatTime(m.time) + "</span>" +
                 "<div>" + escapedMsg + "</div>";

  // --- 如果是自己的訊息，加入刪除三點按鈕 (不移除原本點擊li的行為，因為原本行為已移除) ---
  if (isSelf && key) {
    let delBtn = document.createElement("span");
    delBtn.className = "delete-dots";
    delBtn.textContent = "...";
    // 點擊三點時刪除訊息
    delBtn.addEventListener("click", function(e) {
      e.stopPropagation();  // 防止冒泡 (雖然li沒有點擊事件，但保留無妨)
      if (confirm("Delete your message?")) {
        db.ref("messages/" + room + "/" + key).remove();
      }
    });
    li.appendChild(delBtn);
  }

  document.getElementById("chat").appendChild(li);
  // 自動捲到底部
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function loadMessages(){
  // 監聽新訊息
  db.ref("messages/"+room).limitToLast(100)
    .on("child_added",data=>{
      displayMessage(data.val(),data.key);
    });
  // 監聽刪除訊息
  db.ref("messages/"+room)
    .on("child_removed",data=>{
      let li=document.getElementById("msg-"+data.key);
      if(li) li.remove();
    });
}
</script>

</body>
</html>
