<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat site</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

#chat{
list-style:none;
padding:0;
max-width:500px;
margin:auto;
}

li{
background:white;
margin:5px;
padding:10px;
border-radius:5px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h1>Chat site</h1>

<!-- 進入群組畫面 -->
<div id="join">

<input id="room" placeholder="Enter group name">
<button onclick="joinRoom()">Join Group</button>

</div>


<!-- 聊天室 -->
<div id="chatRoom" style="display:none;">

<input id="name" placeholder="Your name">
<input id="msg" placeholder="Enter message">
<button onclick="send()">send</button>

<ul id="chat"></ul>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCqKKmfHbyMrLwxthpY7YAoNqbekWBOuYk",
  authDomain: "chat-site-12345.firebaseapp.com",
  databaseURL: "https://chat-site-12345-default-rtdb.firebaseio.com",
  projectId: "chat-site-12345",
  storageBucket: "chat-site-12345.firebasestorage.app",
  messagingSenderId: "660571630838",
  appId: "1:660571630838:web:7be88b3d899720ba1590d7",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room=""

function joinRoom(){

room=document.getElementById("room").value

if(room=="") return

document.getElementById("join").style.display="none"
document.getElementById("chatRoom").style.display="block"

loadMessages()

}

function send(){

let name=document.getElementById("name").value
let msg=document.getElementById("msg").value

if(name=="" || msg=="") return

db.ref("messages/"+room).push({
name:name,
msg:msg,
time:Date.now()
})

document.getElementById("msg").value=""

}

function loadMessages(){

db.ref("messages/"+room).on("child_added",function(data){

let message=data.val()

let li=document.createElement("li")

li.textContent=message.name + ": " + message.msg

document.getElementById("chat").appendChild(li)

})

}

</script>

</body>
</html>
